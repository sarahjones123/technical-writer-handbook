name: Documentation CI

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Vale
        run: |
          wget -q https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz
          tar -xzf vale_3.15.1_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/

      - name: Sync Vale styles
        run: vale sync

      - name: Run Markdownlint
        run: npx markdownlint-cli2 "docs/**/*.md"

      - name: Run Vale
        run: vale docs

      - name: Build MkDocs
        run: mkdocs build --strict
